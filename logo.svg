<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 140" role="img" aria-labelledby="title desc">
  <title id="title">SportClub Logo</title>
  <desc id="desc">Logo de SportClub con texto estilizado en blanco y dorado sobre fondo púrpura.</desc>
  <defs>
    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="100%" stop-color="#ffb703" />
    </linearGradient>
  </defs>
  <rect width="640" height="140" rx="24" fill="#3b1f5b" />
  <path d="M40 110 Q220 20 420 110" fill="none" stroke="#f9d342" stroke-width="14" stroke-linecap="round" opacity="0.9" />
  <text x="50%" y="62" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#goldGradient)" stroke="#1a0638" stroke-width="4" paint-order="stroke">SPORT</text>
  <text x="50%" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" opacity="0.92">CLUB</text>
</svg>
